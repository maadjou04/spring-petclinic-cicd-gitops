name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: petclinic-jar
          path: target/*.jar

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate DEV deployment
        run: |
          echo "##########################################"
          echo "#  ✅ DÉPLOIEMENT DEV RÉUSSI (simulé)   #"
          echo "##########################################"
          echo "🏷️  Environnement: dev"
          echo "💻 Instance: t2.nano (simulée)"
          echo "🌐 URL: http://localhost:8080"
          echo "📦 Application: spring-petclinic"
          echo "✅ Terraform apply dev - SUCCESS"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate STAGING deployment
        run: |
          echo "##########################################"
          echo "#  ✅ DÉPLOIEMENT STAGING RÉUSSI (simulé)#"
          echo "##########################################"
          echo "🏷️  Environnement: staging"
          echo "💻 Instance: t2.medium (simulée)"
          echo "🌐 URL: http://localhost:8080"
          echo "✅ Terraform apply staging - SUCCESS"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate PROD deployment
        run: |
          echo "##########################################"
          echo "#  ✅ DÉPLOIEMENT PROD RÉUSSI (simulé)   #"
          echo "##########################################"
          echo "🏷️  Environnement: prod"
          echo "💻 Instance: t2.large (simulée)"
          echo "🌐 URL: http://localhost:8080"
          echo "✅ Terraform apply prod - SUCCESS"
